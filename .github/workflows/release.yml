name: macOS Release Build

on:
  release:
    types: [created]

jobs:
  build-universal:
    name: Build universal macOS binary
    runs-on: macos-latest   # Apple Silicon (arm64)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # arm64 deps via native Homebrew (/opt/homebrew)
      - name: Install arm64 dependencies
        run: brew install libpng pkg-config

      # x86_64 deps via Rosetta Homebrew (/usr/local)
      - name: Install x86_64 dependencies (Rosetta)
        run: |
          if [ ! -f /usr/local/bin/brew ]; then
            arch -x86_64 /bin/bash -c \
              "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)" \
              <<< ""
          fi
          arch -x86_64 /usr/local/bin/brew install libpng pkg-config

      - name: Build arm64
        run: |
          chmod +x build-macos.sh
          ./build-macos.sh arm64

      - name: Build x86_64
        run: ./build-macos.sh x86_64
        env:
          LIBPNG_PREFIX: /usr/local

      - name: Lipo universal binary
        run: |
          mkdir -p dist/macos
          lipo -create \
            dist/bin/arm64/guetzli \
            dist/bin/x86_64/guetzli \
            -output dist/macos/guetzli
          chmod +x dist/macos/guetzli

      - name: Verify universal binary
        run: |
          file dist/macos/guetzli
          lipo -info dist/macos/guetzli

      - name: Package binary
        run: |
          TAG="${{ github.event.release.tag_name }}"
          ASSET="guetzli-${TAG}-macos-universal.tar.gz"
          tar -czf "$ASSET" -C dist/macos guetzli
          echo "ASSET=$ASSET" >> $GITHUB_ENV

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
